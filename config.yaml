retrieval:
  primary_source:     wikipedia
  fallback_source:    duckduckgo
  min_evidence_words: 30
  top_k:              3
  ddg_sleep_seconds:  2.0
 
db:
  path: temphal.db
 
demo:
  cache_ttl_hours: 24
  mode: demo
