llm:
  model: gemini-3-flash-preview
  mock: false
  temperature_generation: 0.0
  temperature_probing:    0.7
  calls_per_minute:       15
 
classifier:
  model_path: outputs/classifier
  max_length:  128
 
paraphraser:
  model: tuner007/pegasus_paraphrase
  n_paraphrases: 7
 
probing:
  volatility_weight:  0.4
  uncertainty_weight: 0.6
